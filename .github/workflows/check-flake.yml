name: Check Nix Flake

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-darwin:
    name: Validate darwin configurations
    runs-on: macos-14 # aarch64-darwin, matches nixpkgs.hostPlatform in flake.nix

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Show flake outputs
        run: nix flake show

      - name: Run flake checks
        run: nix flake check

      - name: Evaluate workmac configuration
        run: nix build --dry-run .#darwinConfigurations.workmac.system

      - name: Evaluate homemac configuration
        run: nix build --dry-run .#darwinConfigurations.homemac.system

      - name: Check Nix formatting
        run: |
          find . -name '*.nix' -not -path './.git/*' -print0 \
            | xargs -0 nix run nixpkgs#nixfmt -- --check

  check-nixos:
    name: Validate NixOS-WSL configurations
    runs-on: ubuntu-latest # x86_64-linux, matches the worksurf WSL target

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Evaluate worksurf configuration
        run: nix build --dry-run .#nixosConfigurations.worksurf.config.system.build.toplevel
