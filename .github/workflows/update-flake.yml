name: Update Nix Flake Inputs

on:
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  update:
    name: Update flake.lock
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14

      - name: Update flake inputs
        run: nix flake update

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update nix flake inputs'
          title: 'chore: update nix flake inputs'
          body: |
            Automated weekly update of Nix flake inputs.

            See the `flake.lock` diff for details on what changed.
          branch: update/nix-flake-inputs
          delete-branch: true
          labels: dependencies
